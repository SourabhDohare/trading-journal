# ===================================
# Trading Journal - Application Config
# COMPLETE FILE — includes OAuth2 section
# ===================================
spring:
  application:
    name: trading-journal-api

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://foodyuser:Sourabh2001@foodyzone-cluster.gdvp3o5.mongodb.net/trading_journal?appName=foodyzone-cluster}
      database: trading_journal
      auto-index-creation: false

  main:
    lazy-initialization: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  cache:
    type: simple

  # ── OAuth2 Social Login ─────────────────────────────────────────────────
  # These endpoints are ONLY registered when this block exists AND
  # spring-boot-starter-oauth2-client is in pom.xml
  security:
    oauth2:
      client:
        registration:

          google:
            client-id:     ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Google

          github:
            client-id:     ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: GitHub

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri:         https://www.googleapis.com/oauth2/v4/token
            user-info-uri:     https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri:         https://github.com/login/oauth/access_token
            user-info-uri:     https://api.github.com/user
            user-name-attribute: id
  # ────────────────────────────────────────────────────────────────────────

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

# ===================================
# JWT Configuration
# ===================================
app:
  jwt:
    secret: ${JWT_SECRET:tradepulse-local-dev-secret-key-minimum-32-chars}
    expiration: 86400000
    refresh-expiration: 604800000

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://trading-journal-plum-gamma.vercel.app}

  # OAuth2 redirect — where Spring sends the browser after successful login
  # Must match OAUTH2_REDIRECT_URI env var on Render
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:https://trading-journal-plum-gamma.vercel.app/auth/callback}

  upload:
    dir: ${UPLOAD_DIR:./uploads}

# ===================================
# Actuator
# ===================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===================================
# Logging
# ===================================
logging:
  level:
    com.tradingjournal: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO

# ===================================
# SpringDoc / Swagger
# ===================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha