# ===================================
# Trading Journal - Application Config
# ===================================
spring:
  application:
    name: trading-journal-api

  data:
    mongodb:
      # uri: ${MONGODB_URI:mongodb://localhost:27017/trading_journal}
      # mongodb+srv://foodyuser:<db_password>@foodyzone-cluster.gdvp3o5.mongodb.net/?appName=foodyzone-cluster
      uri: ${MONGODB_URI:mongodb+srv://foodyuser:Sourabh2001@foodyzone-cluster.gdvp3o5.mongodb.net/trading_journal?appName=foodyzone-cluster}
      database: trading_journal
      auto-index-creation: false

  # ADD THESE to make startup faster
  main:
    lazy-initialization: true   # ← beans initialize on first use, not at startup

    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  cache:
    type: simple

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

# ===================================
# JWT Configuration
# ===================================
app:
  jwt:
    secret: ${JWT_SECRET:tradepulse-local-dev-secret-key-minimum-32-chars}
    expiration: 86400000       # 24 hours
    refresh-expiration: 604800000  # 7 days

  cors:
    # allowed-origins: ${ALLOWED_ORIGINS:https://localhost:4200,http://localhost:3000}
    # vercel link
    allowed-origins: ${ALLOWED_ORIGINS:https://trading-journal-plum-gamma.vercel.app}

  upload:
    dir: ${UPLOAD_DIR:./uploads}

# ===================================
# Actuator
# ===================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===================================
# Logging
# ===================================
logging:
  level:
    com.tradingjournal: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO

# ===================================
# SpringDoc / Swagger
# ===================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
