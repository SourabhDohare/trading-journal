version: '3.8'

services:
  # Spring Boot API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradepulse-api
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Angular Frontend (via nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradepulse-ui
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads_data:
